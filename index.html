<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chronic Kidney Disease Prediction System</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <header>

        <h1><i class="fa-solid fa-heart-pulse"></i> Chronic Kidney Disease Prediction System</h1>

        <p>AI-Based Clinical Disease Classification Dashboard</p>

    </header>

    <div class="container">

        <div class="card">

            <h2>Patient Details</h2>

            <div class="form-group">
                <label>Patient Name</label>
                <input type="text" id="name" placeholder="Enter Patient Name">
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" placeholder="Enter Age">
            </div>

            <div class="form-group">
                <label>Blood Pressure (mmHg)</label>
                <input type="number" id="bp" placeholder="Enter Blood Pressure">
            </div>

            <div class="form-group">
                <label>Blood Glucose (mg/dL)</label>
                <input type="number" id="glucose" placeholder="Enter Blood Glucose">
            </div>

            <div class="form-group">
                <label>Serum Creatinine (mg/dL)</label>
                <input type="number" step="0.1" id="creatinine" placeholder="Enter Creatinine">
            </div>

            <div class="form-group">
                <label>Hemoglobin (g/dL)</label>
                <input type="number" step="0.1" id="hemoglobin" placeholder="Enter Hemoglobin">
            </div>

            <button onclick="predictCKD()">
                <i class="fa-solid fa-stethoscope"></i>
                Predict Disease
            </button>

        </div>

        <div class="card result-card" id="resultBox">

            <div class="icon">
                <i class="fa-solid fa-notes-medical"></i>
            </div>

            <h2>Prediction Result</h2>

            <h1 id="output">Waiting for Prediction...</h1>

            <p id="message">
                Enter patient details and click the Predict Disease button.
            </p>

            <table>

                <tr>
                    <td><b>Confidence</b></td>
                    <td id="confidence">--</td>
                </tr>

                <tr>
                    <td><b>Risk Level</b></td>
                    <td id="risk">--</td>
                </tr>

            </table>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
